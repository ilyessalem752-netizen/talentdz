version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: talentdz_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: talentdz_secret
      MONGO_INITDB_DATABASE: talentdz
    volumes:
      - mongo_data:/data/db
    networks:
      - talentdz_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentdz_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:talentdz_secret@mongodb:27017/talentdz?authSource=admin
      JWT_SECRET: change_this_in_production_very_long_secret
      JWT_REFRESH_SECRET: change_this_refresh_secret_also_long
      JWT_EXPIRE: 15m
      JWT_REFRESH_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
      UPLOAD_PATH: /app/uploads
      MAX_FILE_SIZE: 5242880
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - talentdz_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_APP_NAME: TalentDZ
    container_name: talentdz_web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - talentdz_net

volumes:
  mongo_data:
  uploads_data:

networks:
  talentdz_net:
    driver: bridge
